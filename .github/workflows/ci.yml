name: CI

# Run this workflow on every push and pull request targeting the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Spin up a PostgreSQL container for the tests to use, if needed
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskmanager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: senha
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Download the repository code into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Give execution permission to the Maven wrapper
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # Build the project and run all tests
      - name: Build and run tests
        run: ./mvnw clean verify
